<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkillMash Graph Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --left-width: 320px;
      --right-width: 460px;
      --bg: #101114;
      --panel: #181a20;
      --panel-2: #20232b;
      --line: #313642;
      --text: #f2f4f8;
      --muted: #a8b0bf;
      --skill: #4db6ac;
      --edge: #7d8797;
      --active: #ffffff;
      --danger: #ff6b6b;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: var(--left-width) 6px minmax(0, 1fr) 6px var(--right-width);
      height: 100vh;
    }

    aside {
      min-width: 0;
      border-right: 1px solid var(--line);
      background: var(--panel);
      overflow: auto;
    }

    .details {
      display: flex;
      flex-direction: column;
      height: 100vh;
      border-right: 0;
      border-left: 1px solid var(--line);
      overflow: hidden;
    }

    .resizer {
      position: relative;
      z-index: 5;
      background: var(--line);
      cursor: col-resize;
    }

    .resizer:hover,
    .resizer.dragging {
      background: var(--skill);
    }

    main {
      position: relative;
      min-width: 0;
      background:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
        #0f1116;
      background-size: 28px 28px;
    }

    header {
      position: absolute;
      inset: 16px 16px auto 16px;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .hud,
    .zoom-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      background: rgba(24, 26, 32, .86);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      pointer-events: auto;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 650;
      text-transform: uppercase;
    }

    .section {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .stat {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .stat strong {
      display: block;
      font-size: 21px;
      line-height: 1.1;
    }

    .stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    input,
    select,
    button {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #11141a;
      color: var(--text);
      font: inherit;
    }

    input[type="search"],
    textarea,
    select {
      width: 100%;
      padding: 0 10px;
      outline: 0;
    }

    input[type="search"],
    select {
      height: 36px;
    }

    input[type="number"] {
      height: 36px;
      width: 120px;
      padding: 0 10px;
      outline: 0;
    }

    textarea {
      min-height: 104px;
      padding: 10px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #11141a;
      color: var(--text);
      font: inherit;
      line-height: 1.45;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--skill);
    }

    button {
      height: 36px;
      padding: 0 11px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover,
    input:focus,
    select:focus {
      border-color: #5e6b80;
    }

    label.check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--skill);
    }

    .legend {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .swatch {
      width: 10px;
      height: 10px;
      flex: 0 0 auto;
      border-radius: 50%;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .list {
      display: grid;
      gap: 7px;
      max-height: 32vh;
      overflow: auto;
    }

    .orchestration-results-section {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      flex-direction: column;
    }

    #orchestrationResults {
      flex: 1 1 auto;
      max-height: none;
      min-height: 0;
      align-content: start;
      padding-right: 2px;
    }

    .item {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #141820;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      line-height: 1.35;
    }

    .item:hover,
    .item.active {
      border-color: #66758c;
      color: var(--text);
      background: #1c222d;
    }

    .item small {
      display: block;
      margin-top: 2px;
      color: #7f8999;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    canvas.dragging {
      cursor: grabbing;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .detail-title {
      overflow-wrap: anywhere;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
    }

    .detail-id {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .detail-text {
      color: #d5dae5;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .kv {
      display: grid;
      gap: 8px;
      font-size: 13px;
    }

    .kv div {
      display: grid;
      gap: 2px;
    }

    .kv span {
      color: var(--muted);
      font-size: 12px;
    }

    .error {
      color: var(--danger);
      font-size: 13px;
      line-height: 1.45;
    }

    .primary {
      border-color: rgba(77, 182, 172, .55);
      background: #16302f;
      color: #dffaf6;
    }

    .primary:disabled {
      cursor: wait;
      opacity: .65;
    }

    .plan-card {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #141820;
    }

    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.2);
      border-radius: 50%;
      border-top-color: var(--skill);
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-loading {
      color: var(--skill);
    }

    .status-error {
      color: var(--danger);
    }

    .plan-card.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .plan-card h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
    }

    .plan-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .flow-frame {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f1116;
      padding: 10px;
    }

    .flow-svg {
      display: block;
      min-width: 100%;
      height: auto;
    }

    .flow-edge {
      fill: none;
      stroke: #9aa6b9;
      stroke-width: 2;
    }

    .flow-edge-label rect {
      fill: #10141b;
      stroke: rgba(154, 166, 185, .38);
      rx: 5;
    }

    .flow-edge-label text {
      fill: var(--muted);
      font-size: 10px;
      dominant-baseline: middle;
      text-anchor: middle;
    }

    .flow-node rect {
      fill: #17282c;
      stroke: #4db6ac;
      stroke-width: 1.4;
      rx: 6;
    }

    .flow-node text {
      fill: var(--text);
      font-size: 12px;
      dominant-baseline: middle;
      text-anchor: middle;
    }

    .flow-column-label {
      fill: var(--muted);
      font-size: 11px;
      text-anchor: middle;
    }

    .flow-empty-edge-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      margin-top: 8px;
    }

    .dag {
      display: none;
      gap: 8px;
      overflow-x: auto;
    }

    .dag-stage {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: max-content;
    }

    .dag-stage + .dag-stage::before {
      content: "↓";
      color: var(--muted);
      padding: 0 4px;
    }

    .dag-node {
      padding: 7px 9px;
      border: 1px solid rgba(77, 182, 172, .5);
      border-radius: 7px;
      background: rgba(77, 182, 172, .1);
      color: var(--text);
      font-size: 12px;
      white-space: nowrap;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 280px 6px minmax(0, 1fr);
      }

      .details,
      .resizer.right {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="section stack">
        <div>
          <h1>SkillMash Graph</h1>
          <div class="empty" id="sourceLabel">正在加载 graph 目录</div>
        </div>
        <div class="stats">
          <div class="stat"><strong id="nodeCount">0</strong><span>节点</span></div>
          <div class="stat"><strong id="edgeCount">0</strong><span>边</span></div>
          <div class="stat"><strong id="skillCount">0</strong><span>Skill</span></div>
          <div class="stat"><strong id="visibleCount">0</strong><span>当前显示</span></div>
        </div>
      </div>

      <div class="section stack">
        <h2>筛选</h2>
        <input id="searchInput" type="search" placeholder="搜索 Skill、输入、输出、任务">
        <select id="edgeTypeSelect" aria-label="边类型">
          <option value="all">全部边类型</option>
        </select>
        <label class="check">
          最低置信度
          <span id="confidenceValue">0%</span>
        </label>
        <input id="confidenceThreshold" type="range" min="0" max="100" value="0" step="1" aria-label="最低置信度">
        <label class="check"><input id="skillsOnly" type="checkbox" checked> 只看 Skill 之间的关系</label>
        <label class="check"><input id="hideLowDegree" type="checkbox"> 隐藏孤立低关联节点</label>
      </div>

      <div class="section">
        <h2>图例</h2>
        <div class="legend">
          <div class="legend-item"><span><i class="swatch" style="display:inline-block;background:var(--skill)"></i> Skill</span><span id="legendSkill">0</span></div>
          <div class="legend-item"><span><i class="swatch" style="display:inline-block;background:#f4a261"></i> Artifact</span><span>节点</span></div>
          <div class="legend-item"><span><i class="swatch" style="display:inline-block;background:#ffd166"></i> Slot</span><span>节点</span></div>
          <div class="legend-item"><span><i class="swatch" style="display:inline-block;background:#ffffff"></i> can_feed</span><span>关系</span></div>
          <div class="legend-item"><span><i class="swatch" style="display:inline-block;background:#ffd166"></i> produces</span><span>关系</span></div>
          <div class="legend-item"><span><i class="swatch" style="display:inline-block;background:#f4a261"></i> consumes</span><span>关系</span></div>
          <div class="legend-item"><span><i class="swatch" style="display:inline-block;background:#e9c46a"></i> aggregates</span><span>关系</span></div>
          <div class="legend-item"><span><i class="swatch" style="display:inline-block;background:#73a7ff"></i> similar_to</span><span>关系</span></div>
          <div class="legend-item"><span><i class="swatch" style="display:inline-block;background:#d87bff"></i> substitute_for</span><span>关系</span></div>
        </div>
      </div>

      <div class="section stack">
        <h2>匹配节点</h2>
        <div class="list" id="nodeList"></div>
      </div>

      <div class="section stack">
        <h2>节点详情</h2>
        <div id="detailPanel" class="empty">点击一个节点查看详情。</div>
      </div>

      <div class="section stack">
        <h2>关联边</h2>
        <div class="list" id="edgeList"></div>
      </div>
    </aside>

    <div class="resizer left" id="leftResizer" title="拖动调整左栏宽度"></div>

    <main>
      <header>
        <div class="hud">
          <span class="pill" id="statusPill">初始化</span>
        </div>
        <div class="zoom-tools">
          <button id="zoomOut" title="缩小">-</button>
          <button id="fitView" title="适配画布">适配</button>
          <button id="zoomIn" title="放大">+</button>
        </div>
      </header>
      <canvas id="graphCanvas"></canvas>
    </main>

    <div class="resizer right" id="rightResizer" title="拖动调整右栏宽度"></div>

    <aside class="details">
      <div class="section stack">
        <h2>在线编排</h2>
        <textarea id="orchestrationQuery" placeholder="输入任务目标，例如：我们准备开放企业 API 平台，下个月给首批客户试用，帮我做上线前准备。"></textarea>
        <div class="row">
          <label class="check">Top-K</label>
          <select id="orchestrationTopK" aria-label="推荐计划数量">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="5" selected>5</option>
          </select>
        </div>
        <div class="row">
          <label class="check">Top-M</label>
          <select id="orchestrationTopM" aria-label="送入重排的候选计划数">
            <option value="8">8</option>
            <option value="12">12</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="40" selected>40</option>
            <option value="60">60</option>
          </select>
        </div>
        <div class="row">
          <label class="check">Min Edge Confidence</label>
          <input id="orchestrationMinEdgeConfidence" type="number" min="0" max="1" step="0.05" value="0.7" aria-label="最小边置信度">
        </div>
        <label class="check"><input id="orchestrationAllowSimilar" type="checkbox"> 允许 similar_to 参与槽位替换</label>
        <label class="check"><input id="orchestrationShowCandidates" type="checkbox"> 返回并保留候选计划</label>
        <button id="runOrchestration" class="primary">生成编排计划</button>
        <div id="orchestrationStatus" class="empty">输入任务目标后在下方生成计划图。</div>
      </div>
      <div class="section stack orchestration-results-section">
        <h2>在线编排结果</h2>
        <div class="list" id="orchestrationResults"></div>
      </div>
    </aside>
  </div>

  <script>
    const canvas = document.getElementById("graphCanvas");
    const ctx = canvas.getContext("2d");
    const els = {
      sourceLabel: document.getElementById("sourceLabel"),
      nodeCount: document.getElementById("nodeCount"),
      edgeCount: document.getElementById("edgeCount"),
      skillCount: document.getElementById("skillCount"),
      visibleCount: document.getElementById("visibleCount"),
      legendSkill: document.getElementById("legendSkill"),
      statusPill: document.getElementById("statusPill"),
      searchInput: document.getElementById("searchInput"),
      edgeTypeSelect: document.getElementById("edgeTypeSelect"),
      confidenceThreshold: document.getElementById("confidenceThreshold"),
      confidenceValue: document.getElementById("confidenceValue"),
      skillsOnly: document.getElementById("skillsOnly"),
      hideLowDegree: document.getElementById("hideLowDegree"),
      nodeList: document.getElementById("nodeList"),
      detailPanel: document.getElementById("detailPanel"),
      edgeList: document.getElementById("edgeList"),
      zoomIn: document.getElementById("zoomIn"),
      zoomOut: document.getElementById("zoomOut"),
      fitView: document.getElementById("fitView"),
      orchestrationQuery: document.getElementById("orchestrationQuery"),
      orchestrationTopK: document.getElementById("orchestrationTopK"),
      orchestrationTopM: document.getElementById("orchestrationTopM"),
      orchestrationMinEdgeConfidence: document.getElementById("orchestrationMinEdgeConfidence"),
      orchestrationAllowSimilar: document.getElementById("orchestrationAllowSimilar"),
      orchestrationShowCandidates: document.getElementById("orchestrationShowCandidates"),
      runOrchestration: document.getElementById("runOrchestration"),
      orchestrationStatus: document.getElementById("orchestrationStatus"),
      orchestrationResults: document.getElementById("orchestrationResults"),
      leftResizer: document.getElementById("leftResizer"),
      rightResizer: document.getElementById("rightResizer")
    };

    const colors = {
      skill: "#4db6ac",
      artifact: "#f4a261",
      slot: "#ffd166",
      input: "#4db6ac",
      output: "#4db6ac",
      task: "#4db6ac",
      data_type: "#4db6ac",
      unknown: "#a8b0bf"
    };

    let graph = { nodes: [], edges: [] };
    let visible = { nodes: [], edges: [] };
    let skillsById = new Map();
    let selectedNode = null;
    let hoveredNode = null;
    let transform = { x: 0, y: 0, scale: 1 };
    let pointer = { x: 0, y: 0, down: false, moved: false, lastX: 0, lastY: 0 };
    let simulationRunning = true;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function typeFromId(id) {
      if (id.startsWith("skill:")) return "skill";
      if (id.startsWith("artifact:")) return "artifact";
      if (id.startsWith("slot:")) return "slot";
      if (id.startsWith("input:")) return "input";
      if (id.startsWith("output:")) return "output";
      if (id.startsWith("task:")) return "task";
      if (id.startsWith("type:")) return "data_type";
      return "skill";
    }

    function labelFromId(id) {
      return id.replace(/^(skill:|slot:|input:|output:|artifact:|task:|type:)/, "");
    }

    function normalizeNode(raw, index) {
      const id = String(raw.id || raw.node_id || raw.skill_id || `node:${index}`);
      const normalizedId = id.includes(":") ? id : `skill:${id}`;
      const skillId = normalizedId.replace(/^skill:/, "");
      const skill = skillsById.get(skillId);
      return {
        id: normalizedId,
        type: raw.type || raw.entity_type || typeFromId(normalizedId),
        label: raw.label || raw.name || skill?.name || labelFromId(normalizedId),
        properties: { ...(skill || {}), ...(raw.properties || {}) },
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        degree: 0
      };
    }

    function normalizeEdge(raw) {
      const source = String(raw.source || raw.source_id || "");
      const target = String(raw.target || raw.target_id || "");
      return {
        source: source.includes(":") ? source : `skill:${source}`,
        target: target.includes(":") ? target : `skill:${target}`,
        type: raw.type || raw.relation_type || "relates_to",
        confidence: Number(raw.confidence ?? 1),
        method: raw.method || "deterministic",
        evidence: raw.evidence || raw.metadata || {}
      };
    }

    function normalizeGraph(payload, skillPayload) {
      const skills = Array.isArray(skillPayload)
        ? skillPayload
        : (skillPayload?.skills || payload.skills || []);
      skillsById = new Map(skills.map(skill => [String(skill.id), skill]));

      const rawEdges = Array.isArray(payload.edges) ? payload.edges : [];
      const nodeMap = new Map();

      const rawNodes = Array.isArray(payload.nodes) ? payload.nodes : [];
      rawNodes.forEach((node, index) => {
        const normalized = normalizeNode(node, index);
        nodeMap.set(normalized.id, normalized);
      });

      for (const skill of skills) {
        const id = `skill:${skill.id}`;
        if (!nodeMap.has(id)) {
          nodeMap.set(id, normalizeNode({ id, type: "skill", label: skill.name, properties: skill }, nodeMap.size));
        }
      }

      const edges = rawEdges.map(normalizeEdge).filter(edge => edge.source && edge.target);
      edges.forEach(edge => {
        if (!nodeMap.has(edge.source)) nodeMap.set(edge.source, normalizeNode({ id: edge.source }, nodeMap.size));
        if (!nodeMap.has(edge.target)) nodeMap.set(edge.target, normalizeNode({ id: edge.target }, nodeMap.size));
      });

      const nodes = [...nodeMap.values()];
      const byId = new Map(nodes.map(node => [node.id, node]));
      edges.forEach(edge => {
        const source = byId.get(edge.source);
        const target = byId.get(edge.target);
        if (source) source.degree += 1;
        if (target) target.degree += 1;
      });

      seedPositions(nodes);
      return { nodes, edges };
    }

    function seedPositions(nodes) {
      const width = canvas.clientWidth || 900;
      const height = canvas.clientHeight || 700;
      const radius = Math.min(width, height) * 0.36;
      nodes.forEach((node, index) => {
        const angle = (index / Math.max(1, nodes.length)) * Math.PI * 2;
        const jitter = ((index * 97) % 31) / 31;
        node.x = Math.cos(angle) * radius * (0.55 + jitter * 0.55);
        node.y = Math.sin(angle) * radius * (0.55 + jitter * 0.55);
      });
      transform.x = width / 2;
      transform.y = height / 2;
      transform.scale = 1;
    }

    async function loadDefault() {
      const outputDir = getOutputDirFromUrl();
      const basePath = outputDir || ".skillmash/index";
      try {
        const manifestResponse = await fetchJsonFromDir(basePath, "build_manifest.json");
        const manifest = manifestResponse.ok ? await safeJson(manifestResponse.response) : null;
        const graphName = manifest?.artifacts?.graph || "skill_graph.json";
        const skillsName = manifest?.artifacts?.skills || "skills.json";
        const [graphResponse, skillsResponse] = await Promise.all([
          fetchJsonFromDir(basePath, graphName),
          fetchJsonFromDir(basePath, skillsName)
        ]);
        if (!graphResponse.ok) throw new Error(`无法读取 ${joinUrlPath(basePath, graphName)}`);
        const graphPayload = await graphResponse.response.json();
        const skillPayload = skillsResponse.ok ? await safeJson(skillsResponse.response) : null;
        graph = normalizeGraph(graphPayload, skillPayload);
        const label = outputDir ? `已加载 ${outputDir}` : "已加载默认图";
        els.sourceLabel.textContent = manifest?.created_at ? `${label} · ${new Date(manifest.created_at).toLocaleString()}` : label;
        afterGraphLoaded();
      } catch (error) {
        els.sourceLabel.innerHTML = `<span class="error">${escapeHtml(error.message)}。请在启动服务时通过 --build-dir 传入目录，并确认路径位于服务根目录下。</span>`;
        graph = { nodes: [], edges: [] };
        applyFilters();
      }
    }

    async function fetchJsonFromDir(basePath, fileName) {
      const response = await fetch(joinUrlPath(basePath, fileName));
      return { ok: response.ok, response };
    }

    function getOutputDirFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const value = params.get("build_dir");
      return value ? normalizePath(decodeURIComponent(value)) : "";
    }

    function joinUrlPath(basePath, fileName) {
      const base = normalizePath(basePath).replace(/\/+$/, "");
      const name = normalizePath(fileName).replace(/^\/+/, "");
      if (!base) return `/${name}`;
      return `/${base}/${name}`;
    }

    function normalizePath(path) {
      return String(path || "").replace(/\\/g, "/").replace(/^\/+/, "");
    }

    async function safeJson(response) {
      try {
        return await response.json();
      } catch {
        return null;
      }
    }

    function afterGraphLoaded() {
      const edgeTypes = [...new Set(graph.edges.map(edge => edge.type))].sort();
      els.edgeTypeSelect.innerHTML = '<option value="all">全部边类型</option>' + edgeTypes.map(type => `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`).join("");
      selectedNode = null;
      simulationRunning = true;
      applyFilters();
    }

    function applyFilters() {
      const query = els.searchInput.value.trim().toLowerCase();
      const edgeType = els.edgeTypeSelect.value;
      const minConfidence = Number(els.confidenceThreshold.value || 0) / 100;
      els.confidenceValue.textContent = `${Math.round(minConfidence * 100)}%`;
      const skillsOnly = els.skillsOnly.checked;
      const hideLow = els.hideLowDegree.checked;
      const nodeById = new Map(graph.nodes.map(node => [node.id, node]));
      let edges = graph.edges.filter(edge => {
        if (edgeType !== "all" && edge.type !== edgeType) return false;
        if (edge.confidence < minConfidence) return false;
        const source = nodeById.get(edge.source);
        const target = nodeById.get(edge.target);
        if (!source || !target) return false;
        if (skillsOnly && (source.type !== "skill" || target.type !== "skill")) return false;
        if (query) {
          const haystack = `${nodeSearchText(source)} ${nodeSearchText(target)} ${edge.type}`.toLowerCase();
          return haystack.includes(query);
        }
        return true;
      });

      const ids = new Set();
      edges.forEach(edge => {
        ids.add(edge.source);
        ids.add(edge.target);
      });

      let nodes = graph.nodes.filter(node => {
        if (skillsOnly && node.type !== "skill") return false;
        if (hideLow && node.degree <= 1) return false;
        if (!query) return ids.has(node.id) || graph.edges.length === 0;
        return ids.has(node.id) || nodeSearchText(node).toLowerCase().includes(query);
      });

      const visibleIds = new Set(nodes.map(node => node.id));
      edges = edges.filter(edge => visibleIds.has(edge.source) && visibleIds.has(edge.target));
      visible = { nodes, edges };
      renderStats();
      renderNodeList();
      renderDetails();
      draw();
    }

    function renderStats() {
      const counts = graph.nodes.reduce((acc, node) => {
        acc[node.type] = (acc[node.type] || 0) + 1;
        return acc;
      }, {});
      els.nodeCount.textContent = graph.nodes.length;
      els.edgeCount.textContent = graph.edges.length;
      els.skillCount.textContent = counts.skill || 0;
      els.visibleCount.textContent = visible.nodes.length;
      els.legendSkill.textContent = counts.skill || 0;
      els.statusPill.textContent = visible.nodes.length ? `${visible.nodes.length} nodes / ${visible.edges.length} edges` : "没有可显示的节点";
    }

    function renderNodeList() {
      const topNodes = [...visible.nodes]
        .sort((a, b) => b.degree - a.degree || a.label.localeCompare(b.label))
        .slice(0, 80);
      if (!topNodes.length) {
        els.nodeList.innerHTML = '<div class="empty">没有匹配节点。</div>';
        return;
      }
      els.nodeList.innerHTML = topNodes.map(node => `
        <div class="item ${selectedNode?.id === node.id ? "active" : ""}" data-node-id="${escapeHtml(node.id)}">
          ${escapeHtml(node.label)}
          <small>${escapeHtml(node.type)} · degree ${node.degree}</small>
        </div>
      `).join("");
    }

    function nodeSearchText(node) {
      const props = node.properties || {};
      return [
        node.label,
        node.id,
        props.description,
        ...(props.tasks || []),
        ...(props.inputs || []).flatMap(item => [item.name, item.type, item.description]),
        ...(props.outputs || []).flatMap(item => [item.name, item.type, item.description])
      ].filter(Boolean).join(" ");
    }

    function renderDetails() {
      if (!selectedNode) {
        els.detailPanel.innerHTML = '<div class="empty">点击一个节点查看详情。</div>';
        els.edgeList.innerHTML = '<div class="empty">暂无选择。</div>';
        return;
      }

      const props = selectedNode.properties || {};
      const extraMeta = [];
      if (selectedNode.type === "artifact") {
        if (props.name) extraMeta.push(`<div><span>工件名</span><strong>${escapeHtml(props.name)}</strong></div>`);
        if (props.type) extraMeta.push(`<div><span>工件类型</span><strong>${escapeHtml(props.type)}</strong></div>`);
      }
      if (selectedNode.type === "slot" && props.name) {
        extraMeta.push(`<div><span>槽位名</span><strong>${escapeHtml(props.name)}</strong></div>`);
      }
      const description = props.description ? `<div class="detail-text">${escapeHtml(props.description)}</div>` : "";
      const tags = [...(props.tasks || []), ...(props.skill_tags || []), ...(props.data_tags || [])].slice(0, 16);
      const tagsHtml = tags.length ? `<div>${tags.map(tag => `<span class="pill">${escapeHtml(tag)}</span>`).join(" ")}</div>` : "";
      const ioHtml = selectedNode.type === "skill" ? `
        ${renderIoList("输入", props.inputs || [])}
        ${renderIoList("输出", props.outputs || [])}
      ` : "";
      els.detailPanel.innerHTML = `
        <div>
          <div class="detail-title">${escapeHtml(selectedNode.label)}</div>
          <div class="detail-id">${escapeHtml(selectedNode.id)}</div>
        </div>
        <div class="kv">
          <div><span>类型</span><strong>${escapeHtml(selectedNode.type)}</strong></div>
          <div><span>关联度</span><strong>${selectedNode.degree}</strong></div>
          ${props.version ? `<div><span>版本</span><strong>${escapeHtml(props.version)}</strong></div>` : ""}
          ${extraMeta.join("")}
        </div>
        ${description}
        ${tagsHtml}
        ${ioHtml}
      `;

      const related = graph.edges
        .filter(edge => edge.source === selectedNode.id || edge.target === selectedNode.id)
        .slice(0, 120);
      els.edgeList.innerHTML = related.length ? related.map(edge => {
        const direction = edge.source === selectedNode.id ? "→" : "←";
        const otherId = edge.source === selectedNode.id ? edge.target : edge.source;
        const other = graph.nodes.find(node => node.id === otherId);
        return `<div class="item" data-node-id="${escapeHtml(otherId)}">${direction} ${escapeHtml(other?.label || labelFromId(otherId))}<small>${escapeHtml(edge.type)} · ${Math.round(edge.confidence * 100)}%</small></div>`;
      }).join("") : '<div class="empty">没有关联边。</div>';
    }

    function renderIoList(title, items) {
      if (!items.length) return "";
      return `
        <div class="kv">
          <div><span>${escapeHtml(title)}</span><strong>${items.length}</strong></div>
        </div>
        <div>
          ${items.slice(0, 12).map(item => `
            <span class="pill">${escapeHtml(item.name || "unknown")}:${escapeHtml(item.type || "unknown")}</span>
          `).join(" ")}
        </div>
      `;
    }

    function tick() {
      if (simulationRunning && visible.nodes.length) {
        stepSimulation();
      }
      draw();
      requestAnimationFrame(tick);
    }

    function stepSimulation() {
      const nodes = visible.nodes;
      const nodeById = new Map(nodes.map(node => [node.id, node]));
      const width = canvas.clientWidth || 900;
      const height = canvas.clientHeight || 700;
      const linkDistance = els.skillsOnly.checked ? 150 : 105;

      for (let i = 0; i < nodes.length; i += 1) {
        for (let j = i + 1; j < nodes.length; j += 1) {
          const a = nodes[i];
          const b = nodes[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist2 = Math.max(80, dx * dx + dy * dy);
          const force = Math.min(460 / dist2, 0.07);
          a.vx -= dx * force;
          a.vy -= dy * force;
          b.vx += dx * force;
          b.vy += dy * force;
        }
      }

      visible.edges.forEach(edge => {
        const source = nodeById.get(edge.source);
        const target = nodeById.get(edge.target);
        if (!source || !target) return;
        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const dist = Math.max(1, Math.hypot(dx, dy));
        const strength = edge.type === "can_feed" ? 0.025 : 0.014;
        const force = (dist - linkDistance) * strength;
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        source.vx += fx;
        source.vy += fy;
        target.vx -= fx;
        target.vy -= fy;
      });

      nodes.forEach(node => {
        node.vx += -node.x * 0.002;
        node.vy += -node.y * 0.002;
        node.vx *= 0.82;
        node.vy *= 0.82;
        node.x += node.vx;
        node.y += node.vy;
        node.x = Math.max(-width, Math.min(width, node.x));
        node.y = Math.max(-height, Math.min(height, node.y));
      });
    }

    function draw() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.translate(transform.x, transform.y);
      ctx.scale(transform.scale, transform.scale);

      const nodeById = new Map(visible.nodes.map(node => [node.id, node]));
      const focusId = selectedNode?.id || hoveredNode?.id;
      visible.edges.forEach(edge => {
        const source = nodeById.get(edge.source);
        const target = nodeById.get(edge.target);
        if (!source || !target) return;
        const active = focusId && (edge.source === focusId || edge.target === focusId);
        drawEdge(source, target, edge, active);
      });

      visible.nodes.forEach(node => drawNode(node, node.id === selectedNode?.id, node.id === hoveredNode?.id));
      ctx.restore();
    }

    function drawEdge(source, target, edge, active) {
      const color = active ? "#ffffff" : edgeColor(edge.type);
      ctx.strokeStyle = color;
      ctx.globalAlpha = active ? 0.8 : 0.24;
      ctx.lineWidth = active ? 2.2 : 1.1;
      ctx.beginPath();
      ctx.moveTo(source.x, source.y);
      ctx.lineTo(target.x, target.y);
      ctx.stroke();
      ctx.globalAlpha = 1;

      const angle = Math.atan2(target.y - source.y, target.x - source.x);
      const radius = nodeRadius(target);
      const x = target.x - Math.cos(angle) * radius;
      const y = target.y - Math.sin(angle) * radius;
      ctx.fillStyle = color;
      ctx.globalAlpha = active ? 0.85 : 0.35;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x - Math.cos(angle - 0.5) * 8, y - Math.sin(angle - 0.5) * 8);
      ctx.lineTo(x - Math.cos(angle + 0.5) * 8, y - Math.sin(angle + 0.5) * 8);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function drawNode(node, selected, hovered) {
      const radius = nodeRadius(node);
      ctx.fillStyle = colors[node.type] || colors.unknown;
      ctx.strokeStyle = selected ? "#ffffff" : hovered ? "#e3e8f2" : "rgba(255,255,255,.18)";
      ctx.lineWidth = selected ? 3 : hovered ? 2.4 : 1.2;
      ctx.beginPath();
      ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      if (transform.scale > 0.42 || selected || hovered) {
        ctx.font = `${selected ? 13 : 11}px Inter, system-ui, sans-serif`;
        ctx.fillStyle = selected || hovered ? "#ffffff" : "#cbd2dd";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        const label = node.label.length > 26 ? `${node.label.slice(0, 24)}...` : node.label;
        ctx.fillText(label, node.x, node.y + radius + 5);
      }
    }

    function nodeRadius(node) {
      const base = node.type === "skill" ? 7 : 5;
      return Math.min(22, base + Math.sqrt(Math.max(0, node.degree)) * 2.1);
    }

    function edgeColor(type) {
      if (type === "has_output") return "#4db6ac";
      if (type === "requires_input") return "#4db6ac";
      if (type === "can_feed") return "#ffffff";
      if (type === "produces") return "#ffd166";
      if (type === "consumes") return "#f4a261";
      if (type === "aggregates") return "#e9c46a";
      if (type === "depends_on") return "#8ecae6";
      if (type === "similar_to") return "#73a7ff";
      if (type === "substitute_for") return "#d87bff";
      return "#7d8797";
    }

    function screenToWorld(x, y) {
      return {
        x: (x - transform.x) / transform.scale,
        y: (y - transform.y) / transform.scale
      };
    }

    function findNodeAt(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const point = screenToWorld(clientX - rect.left, clientY - rect.top);
      for (let i = visible.nodes.length - 1; i >= 0; i -= 1) {
        const node = visible.nodes[i];
        const hit = nodeRadius(node) + 5 / transform.scale;
        if (Math.hypot(node.x - point.x, node.y - point.y) <= hit) return node;
      }
      return null;
    }

    function selectNode(node) {
      selectedNode = node;
      renderNodeList();
      renderDetails();
      draw();
    }

    function fitView() {
      if (!visible.nodes.length) return;
      const rect = canvas.getBoundingClientRect();
      const xs = visible.nodes.map(node => node.x);
      const ys = visible.nodes.map(node => node.y);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const graphW = Math.max(1, maxX - minX);
      const graphH = Math.max(1, maxY - minY);
      transform.scale = Math.max(0.18, Math.min(2.2, Math.min((rect.width - 80) / graphW, (rect.height - 80) / graphH)));
      transform.x = rect.width / 2 - ((minX + maxX) / 2) * transform.scale;
      transform.y = rect.height / 2 - ((minY + maxY) / 2) * transform.scale;
      draw();
    }

    function zoomAt(factor) {
      const rect = canvas.getBoundingClientRect();
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      const before = screenToWorld(cx, cy);
      transform.scale = Math.max(0.12, Math.min(4, transform.scale * factor));
      transform.x = cx - before.x * transform.scale;
      transform.y = cy - before.y * transform.scale;
      draw();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    canvas.addEventListener("pointerdown", event => {
      pointer.down = true;
      pointer.moved = false;
      pointer.lastX = event.clientX;
      pointer.lastY = event.clientY;
      canvas.setPointerCapture(event.pointerId);
      canvas.classList.add("dragging");
    });

    canvas.addEventListener("pointermove", event => {
      hoveredNode = findNodeAt(event.clientX, event.clientY);
      if (pointer.down) {
        const dx = event.clientX - pointer.lastX;
        const dy = event.clientY - pointer.lastY;
        if (Math.hypot(dx, dy) > 2) pointer.moved = true;
        transform.x += dx;
        transform.y += dy;
        pointer.lastX = event.clientX;
        pointer.lastY = event.clientY;
      }
      draw();
    });

    canvas.addEventListener("pointerup", event => {
      if (!pointer.moved) {
        selectNode(findNodeAt(event.clientX, event.clientY));
      }
      pointer.down = false;
      canvas.classList.remove("dragging");
    });

    canvas.addEventListener("wheel", event => {
      event.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const before = screenToWorld(event.clientX - rect.left, event.clientY - rect.top);
      const factor = event.deltaY < 0 ? 1.12 : 0.88;
      transform.scale = Math.max(0.12, Math.min(4, transform.scale * factor));
      transform.x = event.clientX - rect.left - before.x * transform.scale;
      transform.y = event.clientY - rect.top - before.y * transform.scale;
      draw();
    }, { passive: false });

    els.nodeList.addEventListener("click", event => {
      const item = event.target.closest("[data-node-id]");
      if (!item) return;
      const node = graph.nodes.find(candidate => candidate.id === item.dataset.nodeId);
      if (node) selectNode(node);
    });

    els.edgeList.addEventListener("click", event => {
      const item = event.target.closest("[data-node-id]");
      if (!item) return;
      const node = graph.nodes.find(candidate => candidate.id === item.dataset.nodeId);
      if (node) selectNode(node);
    });

    [els.searchInput, els.edgeTypeSelect, els.confidenceThreshold, els.skillsOnly, els.hideLowDegree].forEach(el => {
      el.addEventListener("input", applyFilters);
      el.addEventListener("change", applyFilters);
    });

    els.zoomIn.addEventListener("click", () => zoomAt(1.2));
    els.zoomOut.addEventListener("click", () => zoomAt(0.84));
    els.fitView.addEventListener("click", fitView);
    window.addEventListener("resize", resize);

    // 编排功能
    els.runOrchestration.addEventListener("click", runOrchestration);

    async function runOrchestration() {
      const query = els.orchestrationQuery.value.trim();
      if (!query) {
        els.orchestrationStatus.className = "empty status-error";
        els.orchestrationStatus.textContent = "请输入任务目标。";
        return;
      }

      els.runOrchestration.disabled = true;
      els.orchestrationStatus.className = "status-loading";
      els.orchestrationStatus.innerHTML = '<span class="loading-spinner"></span>正在生成编排计划...';
      els.orchestrationResults.innerHTML = '<div class="plan-card loading"><div class="empty">处理中，请稍候...</div></div>';

      try {
        const minEdgeConfidence = Math.max(0, Math.min(1, Number(els.orchestrationMinEdgeConfidence.value || 0.7)));
        const response = await fetch("/api/orchestrate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            top_k: parseInt(els.orchestrationTopK.value, 10),
            top_m: parseInt(els.orchestrationTopM.value, 10),
            min_edge_confidence: minEdgeConfidence,
            allow_similar_slot_substitute: els.orchestrationAllowSimilar.checked,
            show_candidates: els.orchestrationShowCandidates.checked,
            build_dir: getOutputDirFromUrl() || "OUTPUT/v4/graph"
          })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({ error: "请求失败" }));
          throw new Error(errorData.error || `HTTP ${response.status}`);
        }

        const result = await response.json();
        renderOrchestrationResults(result);

        els.orchestrationStatus.className = "empty";
        const recommendedCount = result.recommended_plans?.length || 0;
        const candidateCount = result.plans?.length || 0;
        const rankingMode = result.ranking_mode || "unknown";
        els.orchestrationStatus.textContent = `推荐 ${recommendedCount} 个，候选 ${candidateCount} 个，重排模式：${rankingMode}。`;
      } catch (error) {
        els.orchestrationStatus.className = "empty status-error";
        els.orchestrationStatus.textContent = `生成失败：${error.message}`;
        els.orchestrationResults.innerHTML = `<div class="empty status-error">${escapeHtml(error.message)}</div>`;
      } finally {
        els.runOrchestration.disabled = false;
      }
    }

    function renderOrchestrationResults(result) {
      const recommended = result.recommended_plans || [];
      const candidates = result.plans || [];
      const plans = recommended.length ? recommended : candidates;
      if (!plans.length) {
        const failCounts = result.decision?.fail_code_counts;
        const failSummary = failCounts ? Object.entries(failCounts).map(([k, v]) => `${k}: ${v}`).join(" | ") : "";
        const detail = failSummary ? `<div class="plan-meta">失败原因统计：${escapeHtml(failSummary)}</div>` : "";
        els.orchestrationResults.innerHTML = `<div class="empty">没有找到合适的编排计划。</div>${detail}`;
        return;
      }

      els.orchestrationResults.innerHTML = plans.map((plan, index) => {
        const stages = plan.stages || [];
        const reason = plan.reason || (plan.reasons || []).join("；");
        const edges = plan.can_feed_edges || [];
        const dagHtml = renderDag(stages, edges);
        const graphMeta = `<div class="plan-meta">skills: ${countStageSkills(stages)} · directed edges: ${edges.length}</div>`;
        const reasonHtml = reason ? `<div class="plan-meta">${escapeHtml(reason)}</div>` : "";
        const missing = plan.missing_inputs || [];
        const missingHtml = missing.length
          ? `<div class="plan-meta">缺失输入：${escapeHtml(formatMissing(missing))}</div>`
          : "";
        const status = plan.status || "unknown";
        const title = plan.title || `${recommended.length ? "推荐方案" : "候选方案"} ${index + 1}`;

        return `
          <div class="plan-card">
            <h3>${escapeHtml(title)} · ${escapeHtml(status)}</h3>
            ${graphMeta}
            ${dagHtml}
            ${missingHtml}
            ${reasonHtml}
          </div>
        `;
      }).join("");
    }

    function renderDag(stages, edges = []) {
      if (!stages || !stages.length) return "";
      const stageSkills = stages.map(stage => (
        stage.skill_order || (stage.skills || []).map(skill => skill.skill_id || skill.name || skill.id)
      ).filter(Boolean));
      const positions = new Map();
      const nodeW = 214;
      const nodeH = 46;
      const gapX = 110;
      const gapY = 26;
      const padX = 28;
      const padY = 44;
      const maxRows = Math.max(1, ...stageSkills.map(items => items.length || 1));
      const width = Math.max(260, padX * 2 + stageSkills.length * nodeW + Math.max(0, stageSkills.length - 1) * gapX);
      const height = Math.max(120, padY * 2 + maxRows * nodeH + Math.max(0, maxRows - 1) * gapY);
      const nodes = [];

      stageSkills.forEach((skills, stageIndex) => {
        const totalH = skills.length * nodeH + Math.max(0, skills.length - 1) * gapY;
        const startY = (height - totalH) / 2;
        skills.forEach((skillId, rowIndex) => {
          const id = String(skillId);
          const x = padX + stageIndex * (nodeW + gapX);
          const y = startY + rowIndex * (nodeH + gapY);
          positions.set(id, { x, y, w: nodeW, h: nodeH });
          nodes.push({ id, x, y });
        });
      });

      const graphEdges = (edges || [])
        .map(edge => ({
          source: String(edge.source_id || ""),
          target: String(edge.target_id || ""),
          confidence: edge.confidence,
          method: edge.method,
          title: edgeTitle(edge),
        }))
        .filter(edge => positions.has(edge.source) && positions.has(edge.target));

      const markerId = `arrow_${Math.random().toString(36).slice(2)}`;
      const edgeHtml = graphEdges.map(edge => {
        const a = positions.get(edge.source);
        const b = positions.get(edge.target);
        const x1 = a.x + a.w;
        const y1 = a.y + a.h / 2;
        const x2 = b.x;
        const y2 = b.y + b.h / 2;
        const mid = Math.max(24, (x2 - x1) / 2);
        const label = edge.confidence === undefined || edge.confidence === null
          ? ""
          : Number(edge.confidence).toFixed(2);
        const labelX = (x1 + x2) / 2;
        const labelY = (y1 + y2) / 2 - 10;
        const labelHtml = label
          ? `<g class="flow-edge-label"><rect x="${labelX - 22}" y="${labelY - 9}" width="44" height="18"></rect><text x="${labelX}" y="${labelY}">${escapeHtml(label)}</text></g>`
          : "";
        return `
          <path class="flow-edge" marker-end="url(#${markerId})" d="M ${x1} ${y1} C ${x1 + mid} ${y1}, ${x2 - mid} ${y2}, ${x2} ${y2}">
            <title>${escapeHtml(edge.title)}</title>
          </path>
          ${labelHtml}
        `;
      }).join("");
      const nodeHtml = nodes.map(node => {
        const pos = positions.get(node.id);
        const displayId = shortenSkillId(node.id);
        return `
          <g class="flow-node">
            <title>${escapeHtml(node.id)}</title>
            <rect x="${pos.x}" y="${pos.y}" width="${pos.w}" height="${pos.h}"></rect>
            <text x="${pos.x + pos.w / 2}" y="${pos.y + pos.h / 2}">${escapeHtml(displayId)}</text>
          </g>
        `;
      }).join("");
      const columnLabels = stageSkills.map((skills, index) => {
        const x = padX + index * (nodeW + gapX) + nodeW / 2;
        const label = skills.length > 1 ? `并行组 ${index + 1}` : `执行组 ${index + 1}`;
        return `<text class="flow-column-label" x="${x}" y="18">${escapeHtml(label)}</text>`;
      }).join("");
      const note = graphEdges.length
        ? ""
        : '<div class="flow-empty-edge-note">当前计划没有可展示的 can_feed 有向边，只有单个入口 skill 或边未进入该候选计划。</div>';
      return `
        <div class="flow-frame">
          <svg class="flow-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="Skill directed orchestration graph">
            <defs>
              <marker id="${markerId}" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#9aa6b9"></path>
              </marker>
            </defs>
            ${columnLabels}
            ${edgeHtml}
            ${nodeHtml}
          </svg>
          ${note}
        </div>
      `;
    }

    function countStageSkills(stages) {
      return stages.reduce((total, stage) => {
        const skills = stage.skill_order || stage.skills || [];
        return total + skills.length;
      }, 0);
    }

    function shortenSkillId(id) {
      const text = String(id || "");
      return text.length > 28 ? `${text.slice(0, 25)}...` : text;
    }

    function edgeTitle(edge) {
      const parts = [
        `${edge.source_id || ""} -> ${edge.target_id || ""}`,
      ];
      if (edge.confidence !== undefined && edge.confidence !== null) {
        parts.push(`confidence: ${Number(edge.confidence).toFixed(2)}`);
      }
      if (edge.method) parts.push(`method: ${edge.method}`);
      for (const item of edge.source_outputs || []) parts.push(`output: ${item}`);
      for (const item of edge.target_inputs || []) parts.push(`input: ${item}`);
      for (const item of edge.reasons || []) parts.push(`reason: ${item}`);
      return parts.filter(Boolean).join("\n");
    }

    function formatMissing(items) {
      return items.map(item => `${item.skill_id || ""}:${item.name || ""}(${item.type || "unknown"})`).join(", ");
    }

    function setupResizer(handle, side) {
      let dragging = false;
      handle.addEventListener("pointerdown", event => {
        dragging = true;
        handle.classList.add("dragging");
        handle.setPointerCapture(event.pointerId);
        event.preventDefault();
      });
      handle.addEventListener("pointermove", event => {
        if (!dragging) return;
        const rect = document.querySelector(".app").getBoundingClientRect();
        if (side === "left") {
          const width = Math.max(240, Math.min(560, event.clientX - rect.left));
          document.documentElement.style.setProperty("--left-width", `${width}px`);
        } else {
          const width = Math.max(300, Math.min(680, rect.right - event.clientX));
          document.documentElement.style.setProperty("--right-width", `${width}px`);
        }
        resize();
      });
      const stop = event => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove("dragging");
        try {
          handle.releasePointerCapture(event.pointerId);
        } catch {}
        resize();
      };
      handle.addEventListener("pointerup", stop);
      handle.addEventListener("pointercancel", stop);
    }

    setupResizer(els.leftResizer, "left");
    setupResizer(els.rightResizer, "right");

    resize();
    loadDefault();
    tick();
  </script>
</body>
</html>
